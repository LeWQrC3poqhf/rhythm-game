<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>元素节奏 - MELODY OF ELEMENTS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a12;
      --surface: #12121a;
      --fire: #ff4444;
      --water: #4488ff;
      --wind: #44ff44;
      --earth: #aa8844;
      --thunder: #aa44ff;
      --text: #ffffff;
      --muted: #666688;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(255,68,68,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(68,136,255,0.15) 0%, transparent 50%);
      transition: background 0.5s;
    }

    /* Dynamic background pulse */
    .bg-glow.beat {
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(255,68,68,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(68,136,255,0.3) 0%, transparent 50%);
    }

    /* Health bar */
    .health-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 12px;
      background: var(--surface);
      border-radius: 6px;
      overflow: hidden;
      z-index: 10;
      border: 1px solid #333;
    }
    .health-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff4444, #44ff44);
      transition: width 0.3s ease;
    }
    .health-bar.low {
      background: linear-gradient(90deg, #ff0000, #ff4444);
      animation: health-flash 0.5s infinite;
    }
    @keyframes health-flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .music-info { text-align: left; }
    .music-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .music-artist { font-size: 0.85rem; color: var(--muted); }

    .game-stats {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .score-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: #00ffcc;
      font-variant-numeric: tabular-nums;
    }

    .combo-display {
      font-size: 1.2rem;
      font-weight: 600;
      color: #ff3366;
    }
    .combo-display.hot {
      animation: combo-pulse 0.3s ease;
    }
    .combo-display.fire {
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
    }
    .combo-display.blaze {
      color: #ff0000;
      text-shadow: 0 0 30px #ff0000;
      animation: blaze-pulse 0.2s infinite;
    }
    @keyframes combo-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    @keyframes blaze-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .pause-btn {
      background: var(--surface);
      border: 1px solid #333;
      color: var(--text);
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .pause-btn:hover { background: #222; border-color: #ff3366; }

    .game-area {
      position: relative;
      width: 500px;
      height: 500px;
      cursor: crosshair;
    }

    .magic-circle {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .track-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .outer-circle { width: 420px; height: 420px; border-color: rgba(255,68,68,0.3); }
    .middle-circle { width: 300px; height: 300px; border-color: rgba(68,136,255,0.2); }
    .inner-circle { width: 180px; height: 180px; border-color: rgba(170,136,68,0.2); }

    .track-line {
      position: absolute;
      bottom: 50%;
      left: 50%;
      width: 2px;
      height: 210px;
      transform-origin: bottom center;
      margin-left: -1px;
    }

    .pointer {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 24px solid #fff;
      top: 50%;
      left: 50%;
      margin-left: -12px;
      margin-top: -60px;
      transform-origin: center 60px;
      z-index: 5;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
    }

    .center-point {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      z-index: 4;
      box-shadow: 0 0 20px #fff;
    }

    .hit-zone {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 3px solid #ff3366;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.4;
      z-index: 2;
    }
    .hit-zone.active {
      opacity: 1;
      animation: hit-pulse 0.15s ease;
    }
    @keyframes hit-pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* Notes with fire trail */
    .note {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      margin-left: -16px;
      margin-top: -16px;
      z-index: 3;
      box-shadow: 0 0 15px currentColor;
    }
    .note.fire-trail {
      box-shadow: 0 0 20px currentColor, 0 -10px 30px currentColor;
    }
    .note.fast { width: 24px; height: 24px; margin-left: -12px; margin-top: -12px; }
    .note.hold {
      width: 32px;
      height: 50px;
      border-radius: 16px;
      margin-left: -16px;
      margin-top: -25px;
    }

    /* Storm note - white vortex */
    .note.storm {
      width: 40px;
      height: 40px;
      margin-left: -20px;
      margin-top: -20px;
      background: radial-gradient(circle, #ffffff 0%, #88ccff 30%, transparent 70%);
      box-shadow: 0 0 20px #ffffff, 0 0 40px #88ccff;
      animation: storm-spin 0.5s linear infinite;
    }
    @keyframes storm-spin {
      from { transform: rotate(0deg) translateY(var(--distance, 0px)); }
      to { transform: rotate(360deg) translateY(var(--distance, 0px)); }
    }

    /* Rain effect - FULL screen coverage */
    .rain-drop {
      position: fixed;
      top: 0;
      width: 2px;
      height: 30px;
      background: linear-gradient(to bottom, transparent, #88ccff, #ffffff);
      pointer-events: none;
      animation: rain-fall 0.3s linear forwards;
      z-index: 100;
      opacity: 0.8;
    }
    @keyframes rain-fall {
      from { transform: translateY(-30px); opacity: 1; }
      to { transform: translateY(100vh); opacity: 0.3; }
    }
    .note.hit { animation: note-hit 0.3s ease forwards; }
    @keyframes note-hit {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }

    /* Particle effects */
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      animation: particle-fly 0.6s ease-out forwards;
    }
    @keyframes particle-fly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    .judgment {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      font-weight: 700;
      pointer-events: none;
      animation: judgment-fade 0.5s ease forwards;
      z-index: 10;
    }
    .judgment-perfect { color: #00ffcc; text-shadow: 0 0 20px #00ffcc; font-size: 1.8rem; }
    .judgment-good { color: #ffaa00; text-shadow: 0 0 20px #ffaa00; }
    .judgment-bad { color: #ff6644; text-shadow: 0 0 20px #ff6644; }
    .judgment-miss { color: #ff3333; text-shadow: 0 0 20px #ff3333; }
    .judgment-storm { color: #ffffff; text-shadow: 0 0 30px #88ccff, 0 0 60px #ffffff; font-size: 2rem; animation: storm-text 0.3s ease; }
    @keyframes storm-text {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.5); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    .judgment-s { color: #ff00ff; text-shadow: 0 0 30px #ff00ff; font-size: 2.5rem; }
    .judgment-a { color: #00ffcc; text-shadow: 0 0 25px #00ffcc; font-size: 2.2rem; }
    .judgment-b { color: #44ff44; text-shadow: 0 0 20px #44ff44; font-size: 2rem; }
    .judgment-c { color: #ffaa00; text-shadow: 0 0 20px #ffaa00; font-size: 2rem; }
    .judgment-d { color: #ff4444; text-shadow: 0 0 20px #ff4444; font-size: 2rem; }
    
    @keyframes judgment-fade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
    }

    /* Start Screen */
    .start-screen {
      position: fixed;
      inset: 0;
      background: rgba(10,10,18,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .start-screen h1 {
      font-size: 2.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ff4444, #aa44ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .start-screen h2 {
      font-size: 1.2rem;
      color: var(--muted);
      margin-bottom: 32px;
      font-weight: normal;
    }
    .start-btn {
      background: linear-gradient(135deg, #ff3366, #ff6699);
      border: none;
      color: white;
      padding: 16px 48px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,51,102,0.5);
    }
    .controls-info {
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.8;
    }

    .pause-overlay, .results-screen {
      position: fixed;
      inset: 0;
      background: rgba(10,10,18,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .pause-overlay h2, .results-screen h2 {
      font-size: 2.5rem;
      margin-bottom: 24px;
    }
    .hidden { display: none !important; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .result-item {
      padding: 16px 24px;
      background: var(--surface);
      border-radius: 12px;
      text-align: center;
    }
    .result-item .Label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .result-item .value {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .result-item.perfect .value { color: #00ffcc; }
    .result-item.good .value { color: #ffaa00; }
    .result-item.bad .value { color: #ff6644; }
    .result-item.miss .value { color: #ff3333; }

    .result-rank {
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .footer {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .footer a {
      color: var(--muted);
      text-decoration: none;
    }
    .footer a:hover { color: #ff3366; }
  </style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<!-- Health Bar -->
<div class="health-container" id="healthContainer">
  <div class="health-bar" id="healthBar"></div>
</div>

<div class="start-screen" id="startScreen">
  <h1>元素节奏</h1>
  <h2>MELODY OF ELEMENTS: CHRONO SYMPHONY</h2>
  <button class="start-btn" id="startBtn">开始游戏</button>
  <div class="controls-info">
    <p>🎮 移动鼠标控制指针方向</p>
    <p>🖱️ 当指针对准下落音符时点击</p>
    <p>⏱️ 50ms内 = PERFECT | 100ms内 = GOOD</p>
    <p>❤️ Miss会掉血，血条空了游戏结束</p>
  </div>
</div>

<div class="pause-overlay hidden" id="pauseOverlay">
  <h2>⏸️ 已暂停</h2>
  <button class="start-btn" id="resumeBtn">继续</button>
</div>

<div class="results-screen hidden" id="resultsScreen">
  <div class="result-rank" id="resultRank">S</div>
  <h2>🎉 游戏结束!</h2>
  <div class="results-grid">
    <div class="result-item perfect">
      <div class="Label">PERFECT</div>
      <div class="value" id="perfectCount">0</div>
    </div>
    <div class="result-item good">
      <div class="Label">GOOD</div>
      <div class="value" id="goodCount">0</div>
    </div>
    <div class="result-item bad">
      <div class="Label">BAD</div>
      <div class="value" id="badCount">0</div>
    </div>
    <div class="result-item miss">
      <div class="Label">MISS</div>
      <div class="value" id="missCount">0</div>
    </div>
  </div>
  <div class="result-item">
    <div class="Label">最终得分</div>
    <div class="value" id="finalScore" style="font-size: 2rem; color: #ff3366;">0</div>
  </div>
  <br>
  <button class="start-btn" id="restartBtn">再来一次</button>
</div>

<div class="header">
  <div class="music-info">
    <div class="music-title">Daniel Soul-WorldS - 2023</div>
    <div class="music-artist">by Daniel-Soul-Pro</div>
  </div>
  <div class="game-stats">
    <div class="score-display" id="scoreDisplay">0</div>
    <div class="combo-display" id="comboDisplay">COMBO 0</div>
    <button class="pause-btn" id="pauseBtn">暂停</button>
  </div>
</div>

<div class="game-area" id="gameArea">
  <div class="magic-circle" id="magicCircle">
    <div class="track-circle outer-circle"></div>
    <div class="track-circle middle-circle"></div>
    <div class="track-circle inner-circle"></div>
    <div class="hit-zone" id="hitZone"></div>
    <div class="pointer" id="pointer"></div>
    <div class="center-point"></div>
  </div>
</div>

<div class="footer">
  <a href="https://manus.im/app?from=space" target="_blank">Made with Manus</a>
</div>

let audioCtx = null;
let musicPlaying = false;
let audioElement = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function startMusic() {
  if (musicPlaying) return;
  
  audioElement = new Audio('hard-techno.mp3');
  audioElement.loop = false;
  audioElement.volume = 0.8;
  
  audioElement.play().then(() => {
    musicPlaying = true;
  }).catch(() => {
    startSynthMusic();
  });
}

function startSynthMusic() {
  if (musicPlaying) return;
  const ctx = initAudio();
  musicPlaying = true;
  
  const bpm = 150;
  const beatTime = 60 / bpm;
  const bassNotes = [55, 55, 73.42, 55, 82.41, 55, 73.42, 65.41];
  let bassIdx = 0;
  
  function playKick(time) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
    gain.gain.setValueAtTime(0.8, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(time);
    osc.stop(time + 0.3);
  }
  
  function playBass(time) {
    const freq = bassNotes[bassIdx % bassNotes.length];
    bassIdx++;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.25, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(time);
    osc.stop(time + 0.25);
  }
  
  function playHiHat(time) {
    const bufferSize = ctx.sampleRate * 0.03;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 8000;
    gain.gain.setValueAtTime(0.1, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.03);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(time);
  }
  
  let beatCount = 0;
  function schedule() {
    if (!musicPlaying) return;
    const now = ctx.currentTime;
    
    while (beatCount < now / beatTime + 4) {
      const t = ctx.currentTime + beatCount * beatTime;
      playKick(t);
      if (beatCount % 2 === 0) {
        playBass(t);
        playHiHat(t);
      }
      beatCount++;
    }
    if (musicPlaying) {
      setTimeout(schedule, 100);
    }
  }
  schedule();
}

function stopMusic() {
  musicPlaying = false;
  if (audioElement) {
    audioElement.pause();
    audioElement = null;
  }
}

function playHitSound(freq, duration, type = 'sine') {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// Create particle explosion effect
function createParticles(color, count = 8) {
  const circle = document.getElementById('magicCircle');
  const center = circle.getBoundingClientRect();
  
  for (let i = 0; i < count; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.backgroundColor = color;
    particle.style.left = '50%';
    particle.style.top = '50%';
    
    const angle = (i / count) * Math.PI * 2;
    const distance = 50 + Math.random() * 50;
    particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
    particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
    
    circle.appendChild(particle);
    setTimeout(() => particle.remove(), 600);
  }
}

function getGameTime() {

  }

function updatePointerAngle(e) {
  const rect = elements.magicCircle.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  const dx = e.clientX - centerX;
  const dy = e.clientY - centerY;
  
  let angle = Math.atan2(dx, -dy) * (180 / Math.PI);
  angle = (angle + 360) % 360;
  
  state.pointerAngle = angle;
  elements.pointer.style.transform = `rotate(${angle}deg)`;
}

// Apply speed changes
function updateSpeed(currentTime) {
  // Speed up at 30% and 70% of song
  const progress = currentTime / state.gameDuration;
  if (progress > 0.3 && progress < 0.7) {
    state.speedMultiplier = 1.5;
  } else {
    state.speedMultiplier = 1;
  }
}

// Storm note spawning (15-45 seconds, random track)
function spawnStormNote(currentTime) {
  // Check if we should spawn a storm note
  if (!state.stormActive && !state.stormNoteSpawned && !state.stormNoteHit) {
    const elapsed = currentTime;
    // Spawn between 15-45 seconds
    if (elapsed >= 15000 && elapsed <= 45000) {
      // Check if cooldown has passed
      if (currentTime > state.stormCooldownEnd) {
        // Random chance to spawn
        if (Math.random() < 0.01) {
          state.stormNoteSpawned = true;
          state.stormSpawnTime = currentTime;
          
          // Random track angle (not tied to elements)
          const randomAngle = Math.random() * 360;
          
          // Add storm note
          const stormNote = {
            id: `storm-${currentTime}`,
            element: 'storm',
            angle: randomAngle,
            color: '#ffffff',
            distance: 210,
            targetTime: currentTime + 3000,
            type: 'storm',
            spawnTime: currentTime,
          };
          
          return [stormNote];
        }
      }
    }
  }
  return [];
}

// Check and end storm mode
function updateStormMode(currentTime) {
  // Storm effect ends after 15-30 seconds
  if (state.stormActive && currentTime > state.stormEndTime) {
    state.stormActive = false;
    state.stormCooldownEnd = currentTime + 15000; // 15 second cooldown
    
    // Stop rain
    if (state.rainInterval) {
      clearInterval(state.rainInterval);
      state.rainInterval = null;
    }
  }
}

// Start storm effect with light rain (optimized)

  state.stormActive = true;

  const duration = 15000 + Math.random() * 15000;
  state.stormEndTime = performance.now() - state.gameStartTime + duration;
  
  // Light rain only - like transition
  state.rainInterval = setInterval(() => {

    for (let i = 0; i < 3; i++) {

function getActiveNotes(currentTime) {
  // During storm mode, notes fall faster!
  let speedMult = state.speedMultiplier;
  if (state.stormActive) speedMult *= 2; // 2x faster!
  
  const travelTime = 3000 / speedMult;
  const startDistance = 210;
  const endDistance = 0;
  
  if (!state.chart) return [];
  
  let notes = state.chart.notes
    .filter(note => {
      const timeDiff = note.time - currentTime;
      return timeDiff > -500 && timeDiff <= travelTime;
    })
    .map(note => {
      const elementIdx = ELEMENTS.findIndex(e => e.key === note.element);
      const timeUntilHit = note.time - currentTime;
      const progress = 1 - (timeUntilHit / travelTime);
      const clampedProgress = Math.max(0, Math.min(1, progress));
      const distance = startDistance + (endDistance - startDistance) * clampedProgress;
      
      return {
        id: `${note.time}-${note.element}`,
        element: note.element,
        elementIdx: elementIdx >= 0 ? elementIdx : 0,
        angle: ELEMENTS[elementIdx >= 0 ? elementIdx : 0].angle,
        color: ELEMENTS[elementIdx >= 0 ? elementIdx : 0].color,
        distance: distance,
        targetTime: note.time,
        type: note.type,
      };
    });
  
  // Storm mode: NO extra notes (removed for performance)
  
  return notes;
  if (state.stormNoteSpawned && !state.activeNotes.has('storm')) {
    const stormTimeRemaining = (state.stormSpawnTime + 3000) - currentTime;
    if (stormTimeRemaining > -500) {
      const progress = 1 - (stormTimeRemaining / 3000);
      const clampedProgress = Math.max(0, Math.min(1, progress));
      const distance = startDistance + (endDistance - startDistance) * clampedProgress;
      
      notes.push({
        id: 'storm-note',
        element: 'storm',
        angle: state.stormAngle || 0,
        color: '#ffffff',
        distance: distance,
        targetTime: state.stormSpawnTime + 3000,
        type: 'storm',
      });
    }
  }
  
  return notes;
}

function renderNotes(notes) {
  document.querySelectorAll('.note').forEach(el => {
    if (!el.classList.contains('hit')) el.remove();
  });
  
  notes.forEach(note => {
    if (document.getElementById(`note-${note.id}`)) return;
    
    const noteEl = document.createElement('div');
    let noteClass = 'note';
    if (note.type === 'sixteenth') noteClass += ' fast';
    if (note.type === 'hold') noteClass += ' hold';
    if (note.type === 'storm') noteClass += ' storm';
    if (state.combo >= 100 && note.type !== 'storm') noteClass += ' fire-trail';
    
    noteEl.className = noteClass;
    noteEl.id = `note-${note.id}`;
    noteEl.style.backgroundColor = note.color;
    
    // Storm notes rotate with spin animation
    if (note.type === 'storm') {
      noteEl.style.setProperty('--distance', `-${note.distance}px`);
      noteEl.style.animation = `storm-spin 0.5s linear infinite`;
      noteEl.style.transform = `rotate(${note.angle}deg)`;
    } else {
      noteEl.style.transform = `rotate(${note.angle}deg) translateY(${-note.distance}px)`;
    }
    
    elements.magicCircle.appendChild(noteEl);
  });
}

function getMatchedElement() {
  const tolerance = 36;
  for (let i = 0; i < ELEMENTS.length; i++) {
    let diff = Math.abs(state.pointerAngle - ELEMENTS[i].angle);
    if (diff > 180) diff = 360 - diff;
    if (diff <= tolerance) return i;
  }
  return -1;
}

// Get storm note distance from center
function getStormNoteDistance(currentTime) {
  if (!state.stormNoteSpawned || state.activeNotes.has('storm-note')) return null;
  
  const targetTime = state.stormSpawnTime + 3000;
  const timeUntilHit = targetTime - currentTime;
  const progress = 1 - (timeUntilHit / 3000);
  const distance = 210 + (0 - 210) * Math.max(0, Math.min(1, progress));
  
  return distance;
}

// Check for storm note miss

function handleInput() {
  if (state.status !== 'playing') return;
  if (state.health <= 0) return;
  
  const currentTime = getGameTime();
  
  // Check for storm note first (can be hit anywhere, no element requirement)
  if (state.stormNoteSpawned && !state.activeNotes.has('storm-note')) {
    const stormNoteDistance = getStormNoteDistance(currentTime);
    // Storm note can be hit when it's close to center (within 60px)
    if (stormNoteDistance !== null && stormNoteDistance < 60) {
      // Hit the storm note!
      state.activeNotes.add('storm-note');
      state.stormNoteHit = true;
      state.score += 1000;
      
      // Start storm effect
      startStormEffect();
      
      // Show special judgment
      showJudgment('STORM!');
      createParticles('#ffffff', 30);
      pulseBackground();
      
      updateScoreDisplay();
      return;
    }
  }
  
  const matchedIdx = getMatchedElement();
  
  if (matchedIdx === -1) {
    return;
  }
  
  const matchedElement = ELEMENTS[matchedIdx];
  if (!state.chart) return;
  
  // Storm mode: faster notes but NO extra notes (removed for performance)
  const hitWindow = state.stormActive ? 150 : 200;
  
  const relevantNotes = state.chart.notes.filter(note => {
    if (note.element !== matchedElement.key) return false;
    const timeDiff = Math.abs(note.time - currentTime);
    return timeDiff <= hitWindow && !state.activeNotes.has(`${note.time}-${note.element}`);
  });
  
  if (relevantNotes.length === 0) {
    return;
  }
  
  const closestNote = relevantNotes.reduce((closest, note) => {
    const diff = Math.abs(note.time - currentTime);
    const closestDiff = Math.abs(closest.time - currentTime);
    return diff < closestDiff ? note : closest;
  });
  
  const timeDiff = closestNote.time - currentTime;
  let judgment;
  let damageReduction = 1;
  
  // During storm mode, reduced damage from misses
  if (state.stormActive) {
    damageReduction = 0.5;
  }
  
  if (Math.abs(timeDiff) <= 50) {
    judgment = 'PERFECT';
    state.perfect++;
    state.combo++;
    state.score += 300 * (1 + Math.floor(state.combo / 10) * 0.1) * state.speedMultiplier;
    state.health = Math.min(100, state.health + 2);
    playHitSound(880, 0.15, 'triangle');
    createParticles('#00ffcc', 12);
    pulseBackground();
  } else if (Math.abs(timeDiff) <= 100) {
    judgment = 'GOOD';
    state.good++;
    state.combo++;
    state.score += 100 * (1 + Math.floor(state.combo / 10) * 0.1) * state.speedMultiplier;
    state.health = Math.min(100, state.health + 1);
    playHitSound(550, 0.15, 'triangle');
    createParticles('#ffaa00', 6);
  } else if (timeDiff > 0) {
    judgment = 'BAD';
    state.bad++;
    state.combo = 0;
    state.health = Math.max(0, state.health - 5 * damageReduction);
    playHitSound(300, 0.1, 'sawtooth');
  } else {
    judgment = 'MISS';
    state.combo = 0;
    state.health = Math.max(0, state.health - 10 * damageReduction);
    playHitSound(200, 0.1, 'sawtooth');
  }
  
  if (judgment === 'PERFECT' || judgment === 'GOOD') {
    state.activeNotes.add(`${closestNote.time}-${closestNote.element}`);
  }
  
  const noteEl = document.getElementById(`note-${closestNote.time}-${closestNote.element}`);
  if (noteEl) noteEl.classList.add('hit');
  
  showJudgment(judgment);
  elements.hitZone.classList.add('active');
  setTimeout(() => elements.hitZone.classList.remove('active'), 150);
  
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;
  
  updateHealthDisplay();
  updateComboDisplay();
  updateScoreDisplay();
  
  // Check game over
  if (state.health <= 0) {
    endGame();
  }
}

function showJudgment(type) {
  const judgment = document.createElement('div');
  judgment.className = `judgment judgment-${type.toLowerCase()}`;
  judgment.textContent = type;
  elements.magicCircle.appendChild(judgment);
  setTimeout(() => judgment.remove(), 500);
}

function updateScoreDisplay() {
  elements.scoreDisplay.textContent = Math.floor(state.score);
}

function updateComboDisplay() {
  elements.comboDisplay.textContent = `COMBO ${state.combo}`;
  elements.comboDisplay.classList.remove('fire', 'blaze');
  
  if (state.combo >= 200) {
    elements.comboDisplay.classList.add('blaze');
  } else if (state.combo >= 100) {
    elements.comboDisplay.classList.add('fire');
  } else if (state.combo > 0) {
    elements.comboDisplay.classList.add('hot');
    setTimeout(() => elements.comboDisplay.classList.remove('hot'), 300);
  }
}

function updateHealthDisplay() {
  elements.healthBar.style.width = `${state.health}%`;
  if (state.health <= 30) {
    elements.healthBar.classList.add('low');
  } else {
    elements.healthBar.classList.remove('low');
  }
}

function checkMisses(currentTime) {
  if (!state.chart) return;
  
  // Check for storm note miss (50% health penalty!)
  if (state.stormNoteSpawned && !state.activeNotes.has('storm-note')) {
    const targetTime = state.stormSpawnTime + 3000;
    if (currentTime > targetTime + 50) {
      // Missed the storm note!
      state.activeNotes.add('storm-note');
      state.miss++;
      state.combo = 0;
      // 50% of current health!
      state.health = Math.max(0, Math.floor(state.health * 0.5));
      showJudgment('MISS');
      updateHealthDisplay();
      updateComboDisplay();
    }
  }
  
  // Check regular note misses
  state.chart.notes.forEach(note => {
    const noteId = `${note.time}-${note.element}`;
    if (state.activeNotes.has(noteId)) return;
    if (currentTime > note.time + 50) {
      state.activeNotes.add(noteId);
      state.miss++;
      state.combo = 0;
      
      // During storm mode, reduced damage
      let damage = 10;
      if (state.stormActive) damage = 5;
      state.health = Math.max(0, state.health - damage);
      
      showJudgment('MISS');
      updateHealthDisplay();
      updateComboDisplay();
    }
  });
}

function calculateRank() {
  const total = state.perfect + state.good + state.bad + state.miss;
  if (total === 0) return 'D';
  const accuracy = (state.perfect + state.good * 0.5) / total;
  if (accuracy >= 0.95) return 'S';
  if (accuracy >= 0.85) return 'A';
  if (accuracy >= 0.70) return 'B';
  if (accuracy >= 0.50) return 'C';
  return 'D';
}

function gameLoop() {
  if (state.status !== 'playing') return;
  if (state.health <= 0) {
    endGame();
    return;
  }
  
  const currentTime = getGameTime();
  
  updateSpeed(currentTime);
  updateStormMode(currentTime);
  
  // Try to spawn storm note (between 15-45 seconds)
  if (!state.stormActive && !state.stormNoteSpawned && !state.stormNoteHit) {
    if (currentTime >= 15000 && currentTime <= 45000) {
      if (Math.random() < 0.005) {
        // Spawn storm note!
        state.stormNoteSpawned = true;
        state.stormSpawnTime = currentTime;
        // Random angle for storm note (anywhere, not tied to elements)
        state.stormAngle = Math.random() * 360;
      }
    }
  }
  
  if (currentTime > state.gameDuration) {
    endGame();
    return;
  }
  
  const activeNotes = getActiveNotes(currentTime);
  renderNotes(activeNotes);
  checkMisses(currentTime);
  
  requestAnimationFrame(gameLoop);
}

function startGame() {
  initAudio();
  
  state.status = 'playing';
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.health = 100;
  state.perfect = 0;
  state.good = 0;
  state.bad = 0;
  state.miss = 0;
  state.activeNotes.clear();
  state.chart = getChart();
  state.gameDuration = (state.chart.duration || 60) * 1000;
  state.gameStartTime = performance.now();
  state.speedMultiplier = 1;
  
  // Reset storm system
  state.stormActive = false;
  state.stormNoteSpawned = false;
  state.stormNoteHit = false;
  state.stormEndTime = 0;
  state.stormCooldownEnd = 0;
  if (state.rainInterval) {
    clearInterval(state.rainInterval);
    state.rainInterval = null;
  }
  
  updateHealthDisplay();
  
  try { startMusic(); } catch(e) {}
  
  elements.startScreen.classList.add('hidden');
  elements.pauseOverlay.classList.add('hidden');
  elements.resultsScreen.classList.add('hidden');
  
  updateScoreDisplay();
  updateComboDisplay();
  requestAnimationFrame(gameLoop);
}

function pauseGame() {
  if (state.status !== 'playing') return;
  state.status = 'paused';
  if (audioElement) audioElement.pause();
  stopMusic();
  elements.pauseOverlay.classList.remove('hidden');
}

function resumeGame() {
  if (state.status !== 'paused') return;
  state.status = 'playing';
  if (audioElement) audioElement.play();
  else startMusic();
  elements.pauseOverlay.classList.add('hidden');
  requestAnimationFrame(gameLoop);
}

function endGame() {
  state.status = 'ended';
  stopMusic();
  
  const rank = calculateRank();
  
  elements.perfectCount.textContent = state.perfect;
  elements.goodCount.textContent = state.good;
  elements.badCount.textContent = state.bad;
  elements.missCount.textContent = state.miss;
  elements.finalScore.textContent = Math.floor(state.score);
  elements.resultRank.textContent = rank;
  elements.resultRank.className = `result-rank judgment-${rank.toLowerCase()}`;
  
  elements.resultsScreen.classList.remove('hidden');
}

initElements();

document.getElementById('startBtn').addEventListener('click', async () => {
  // 确保 chart 已加载
  if (!chartData) {
    await loadChart();
  }
  startGame();
});
document.getElementById('pauseBtn').addEventListener('click', pauseGame);
document.getElementById('resumeBtn').addEventListener('click', resumeGame);
document.getElementById('restartBtn').addEventListener('click', async () => {
  if (!chartData) {
    await loadChart();
  }
  startGame();
});

document.addEventListener('mousemove', (e) => {
  if (state.status === 'playing') {
    updatePointerAngle(e);
  }
});

document.addEventListener('click', (e) => {
  if (state.status === 'playing') {
    handleInput();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.status === 'start') {
      startGame();
    } else if (state.status === 'paused') {
      resumeGame();
    } else if (state.status === 'playing') {
      handleInput();
    }
  }
  if (e.code === 'Escape' && state.status === 'playing') {
    pauseGame();
  }
});
</script>
